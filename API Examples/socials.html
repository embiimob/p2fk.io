<body>
    <div class="container">
        <div class="search-bar-wrapper">
            <div class="search-bar">
                <input type="text" id="urnInput" placeholder="Enter URN (e.g., embii4u) or #keyword" />
                <label><input type="checkbox" id="mainnetToggle" /> Mainnet</label>
                <button id="searchBtn" onclick="searchProfile()">Search</button>
                <button class="url-help-btn" onclick="openUrlBuilder()" title="URL Builder — generate a shareable search link">📎</button>
            </div>
            <div class="freetext-search-row">
                <input type="text" id="freetextInput" placeholder="Free Text Search…" />
                <button id="freetextSearchBtn" onclick="doFreeTextSearch()">🔍 Search</button>
            </div>
        </div>
        <div class="sidebar">
            <div id="profileSection" class="profile-section">
                <div class="profile-image-container">
                    <img id="profileImage" src="" alt="Profile Image" />
                </div>
                <div class="profile-details">
                    <h2 id="profileName"></h2>
                    <p id="profileBio"></p>
                    <p id="profileLocation"></p>
                    <p id="profileLinks"></p>
                    <p id="profileCreated"></p>
                    <p id="profileChanged"></p>
                    <p id="profileCreated"></p>
                    <p id="profileChanged"></p>
                    <p id="totalMessages">Total Messages: Loading...</p>
                </div>
                <div id="profileLoading" class="profile-loading">Loading profile...</div>
            </div>
        </div>
        <div id="messagesThread" class="messages-thread"></div>
        <div id="loading" class="loading" style="display: none;">Loading more messages...</div>
        <div id="error" class="error" style="display: none;"></div>
        <!-- Free-text search results -->
        <div id="freetextResultsSection" class="freetext-results-wrapper" style="display:none;">
            <div class="freetext-section-title">👤 Profile Results</div>
            <div id="freetextProfilesList"></div>
            <div class="freetext-section-title">📦 Root Results</div>
            <div id="freetextRootsList"></div>
            <button id="ftLoadMore" onclick="loadMoreFreetext()">Load More</button>
        </div>
    </div>

    <!-- URL Builder Modal -->
    <div id="urlBuilderOverlay" class="url-builder-overlay">
        <div class="url-builder-modal">
            <button class="url-builder-close" onclick="closeUrlBuilder()">X</button>
            <h3>🔗 URL Builder</h3>
            <label class="ub-field-label" for="ubUrn">URN</label>
            <input type="text" id="ubUrn" placeholder="e.g., AllenVandever" />
            <div class="ub-checkbox-row">
                <input type="checkbox" id="ubMainnet" />
                <label for="ubMainnet">Mainnet</label>
            </div>
            <div class="ub-actions">
                <button class="ub-btn-generate" onclick="generateUrlBuilder()">Generate URL</button>
                <button class="ub-btn-copy" onclick="copyUrlBuilder()">Copy</button>
                <button class="ub-btn-go" onclick="goUrlBuilder()">Go</button>
            </div>
            <div class="ub-output" id="ubOutput"></div>
            <p class="ub-example">Example: <code>socials.html?urn=AllenVandever&amp;mainnet=true</code></p>
        </div>
    </div>

    <script>
        const state = {
            skip: 0,
            batchSize: 20,
            isLoading: false,
            isSearching: false,
            hasMore: true,
            currentURN: "",
            creatorAddress: "",
            allMessages: [],
            retryDelay: 2000,
            displayedMessageIds: new Set(),
            totalMessages: 0,
            currentMainnet: false,
            imageCache: new Map(),
            keywordCache: new Map(),
            fallbackImage:
                "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='180'><rect width='100%' height='100%' fill='%23333'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='14'>No Image</text></svg>",
            currentSearchId: null,
            abortController: null
        };

        const MAX_CACHE_SIZE = 100;

        const getCachedProfile = (address) => {
            const cached = sessionStorage.getItem(`profile_${address}`);
            return cached ? JSON.parse(cached) : null;
        };
        const cacheProfile = (address, profile) =>
            sessionStorage.setItem(`profile_${address}`, JSON.stringify(profile));

        const getCachedMessages = (address, mainnet) => {
            const cached = sessionStorage.getItem(
                `messages_${address}_${mainnet ? "mainnet" : "testnet"}`
            );
            return cached ? JSON.parse(cached) : null;
        };
        const cacheMessages = (address, mainnet, messages) =>
            sessionStorage.setItem(
                `messages_${address}_${mainnet ? "mainnet" : "testnet"}`,
                JSON.stringify(messages)
            );

        const getUrnSource = (urn, mainnet) => {
            if (!urn) return "Unknown";
            if (/^(BTC|LTC|DOG|MZC):/i.test(urn))
                return mainnet
                    ? urn.split(":")[0].toUpperCase()
                    : `${urn.split(":")[0].toUpperCase()}-T`;
            if (/^[A-Za-z0-9]+\/.+/.test(urn)) return mainnet ? "BTC" : "BTC-T";
            if (urn.startsWith("IPFS:")) return "IPFS";
            if (/^(http|https):\/\//i.test(urn))
                return "HTTP" + (urn.startsWith("https") ? "S" : "");
            return urn.length > 20 ? urn.slice(0, 20) + "..." : urn;
        };

        const fetchAPI = async (url, errorMsg, signal, timeout = 10000) => {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: signal || controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(errorMsg);
                return response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    console.log(`Fetch timed out or aborted: ${url}`);
                    return null;
                }
                throw error;
            }
        };

        const fetchProfile = (urn, mainnet, signal) =>
            fetchAPI(
                `https://p2fk.io/GetProfileByURN/${encodeURIComponent(urn)}?mainnet=${mainnet}`,
                `Profile not found for URN: ${urn}`,
                signal
            );

        const fetchMessages = (address, mainnet, skip, qty, signal) =>
            fetchAPI(
                `https://p2fk.io/GetPublicMessagesByAddress/${encodeURIComponent(
                    address
                )}?skip=${skip}&qty=${qty}&mainnet=${mainnet}`,
                `Messages not found for address: ${address}`,
                signal
            );

        const fetchProfileByAddress = async (address, mainnet, signal) => {
            if (!address || typeof address !== 'string' ||
                !(/^[a-zA-Z0-9]{26,35}$/.test(address.trim()) || /^(bc1|tb1)[a-z0-9]{39,59}$/.test(address.trim()))) {
                console.warn(`Fetch aborted: Invalid address "${address}"`);
                return null;
            }
            const cached = getCachedProfile(address);
            if (cached) {
                console.log(`Cache hit for profile: ${address}`);
                return cached;
            }
            try {
                const profile = await fetchAPI(
                    `https://p2fk.io/GetProfileByAddress/${encodeURIComponent(address)}?mainnet=${mainnet}`,
                    `Profile not found for address: ${address}`,
                    signal
                );
                if (profile) cacheProfile(address, profile);
                return profile;
            } catch (e) {
                if (e.name === 'AbortError') {
                    console.log(`Fetch aborted for address: ${address}`);
                    return null;
                }
                console.error(`Error fetching profile for address "${address}":`, e);
                return null;
            }
        };

        const resolveUrnPath = (urn) => {
            if (!urn) return "";
            urn = urn.replace(/\\/g, "/").replace(/\s+/g, "");
            const parts = urn.split(":").pop().split("/");
            return /^(BTC|LTC|DOG|MZC):/i.test(urn) || /^[A-Za-z0-9]+\/.+/.test(urn)
                ? `https://bitfossil.org/${parts[0]}/${parts[1] || ""}`
                : "";
        };

        const getImageUrl = (image, urn) => {
            const normalize = (input) =>
                typeof input === "string"
                    ? input.replace(/\\/g, "/").replace(/\s+/g, "").trim()
                    : null;
            const resolve = (input) => {
                if (!input) return null;
                const value = normalize(input);
                const lower = value.toLowerCase();
                try {
                    const parsedUrl = new URL(value);
                    if (parsedUrl.protocol === "file:") {
                        console.error(`Rejected file:// URL: ${value}`);
                        return null;
                    }
                    if (["https:", "data:"].includes(parsedUrl.protocol)) {
                        return value
                            .replace(/^http:\/\/bitfossil\.com\//i, "https://bitfossil.org/")
                            .replace(/^http:/i, "https:");
                    }
                } catch (e) {
                    // Not a valid URL, proceed with other checks
                }
                if (lower.startsWith("ipfs") || lower.startsWith("ipfs:")) {
                    const hashMatch = value.match(/ipfs[:/]*([a-zA-Z0-9]+)/i);
                    if (hashMatch) return `https://ipfs.io/ipfs/${hashMatch[1]}`;
                    return null;
                }
                return /^(BTC|LTC|DOG|MZC):/i.test(value) ||
                    /^[A-Za-z0-9]+\/.+/.test(value)
                    ? resolveUrnPath(value)
                    : null;
            };
            return resolve(image) || resolve(urn) || state.fallbackImage;
        };

        const cacheImage = (url, resolvedUrl) => {
            if (state.imageCache.size >= MAX_CACHE_SIZE) {
                const firstKey = state.imageCache.keys().next().value;
                state.imageCache.delete(firstKey);
            }
            state.imageCache.set(url, resolvedUrl);
        };

        const fetchFileSize = async (url, sizeEl) => {
            try {
                const res = await fetch(url, { method: "HEAD", signal: AbortSignal.timeout(8000) });
                const len = res.headers.get("content-length");
                sizeEl.textContent = len ? (formatBytes(parseInt(len, 10)) || "Size unknown") : "Size unknown";
            } catch {
                sizeEl.textContent = "Size unavailable";
            }
        };

        const escapeHtml = (str) => str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");

        const getFileCardIcon = (ext) => {
            if (/^(zip|tar|gz|bz2|xz|rar|7z|tgz)$/.test(ext)) return "📦";
            if (/^(doc|docx|odt|rtf)$/.test(ext)) return "📝";
            if (/^(xls|xlsx|ods|csv)$/.test(ext)) return "📊";
            if (/^(ppt|pptx|odp)$/.test(ext)) return "📋";
            if (/^(txt|log|md)$/.test(ext)) return "📃";
            if (/^(exe|dmg|apk|deb|rpm|msi)$/.test(ext)) return "⚙️";
            if (/^(json|xml|yaml|yml|toml|ini|cfg)$/.test(ext)) return "🔧";
            if (/^(js|ts|py|java|c|cpp|cs|go|rs|php|rb|sh)$/.test(ext)) return "💻";
            if (!ext) return "🔗";
            return "📎";
        };

        const formatBytes = (bytes) => {
            const n = Number(bytes);
            if (!Number.isFinite(n) || n < 0) return null;
            if (n === 0) return "0 B";
            const mb = n / (1024 * 1024);
            const kb = n / 1024;
            return mb >= 1 ? `${mb.toFixed(1)} MB` : kb >= 1 ? `${kb.toFixed(1)} KB` : `${n} B`;
        };

        const fetchRootByTransactionId = async (txid, mainnet, signal) => {
            if (!txid || !/^[0-9a-fA-F]{64}$/.test(txid)) return null;
            try {
                return await fetchAPI(
                    `https://p2fk.io/GetRootByTransactionID/${encodeURIComponent(txid)}?mainnet=${mainnet}&verbose=false`,
                    `Root not found for transaction: ${txid}`,
                    signal,
                    15000
                );
            } catch (e) {
                if (e.name !== "AbortError") console.warn(`GetRootByTransactionID failed for ${txid}:`, e.message);
                return null;
            }
        };

        const loadImageWithTimeout = async (url, timeout = 15000, retries = 3) => {
            if (state.imageCache.has(url)) {
                console.log(`Cache hit for image: ${url}`);
                return state.imageCache.get(url);
            }
            if (url === state.fallbackImage) return url;

            const gateways = [
                'https://ipfs.io/ipfs/',
                'https://dweb.link/ipfs/',
                'https://cloudflare-ipfs.com/ipfs/'
            ];

            let currentUrl = url;
            try {
                const parsedUrl = new URL(url);
                if (parsedUrl.protocol === "file:") {
                    console.error(`Rejected file:// URL in loadImageWithTimeout: ${url}`);
                    cacheImage(url, state.fallbackImage);
                    return state.fallbackImage;
                }
                if (parsedUrl.protocol === "ipfs:") {
                    const hash = url.replace(/^ipfs[:/]+/i, "").split("/")[0];
                    currentUrl = `${gateways[0]}${hash}`;
                }
            } catch (e) {
                console.warn(`Invalid URL format, treating as IPFS hash: ${url}`);
                const hashMatch = url.match(/ipfs[:/]*([a-zA-Z0-9]+)/i);
                if (hashMatch) {
                    currentUrl = `${gateways[0]}${hashMatch[1]}`;
                } else {
                    console.error(`Failed to parse URL: ${url}`);
                    cacheImage(url, state.fallbackImage);
                    return state.fallbackImage;
                }
            }

            for (let attempt = 0; attempt <= retries; attempt++) {
                const gatewayUrl = currentUrl.includes("ipfs.io") || currentUrl.includes("dweb.link") || currentUrl.includes("cloudflare-ipfs.com")
                    ? currentUrl.replace(/https:\/\/[^\/]+\/ipfs\//, gateways[attempt % gateways.length])
                    : currentUrl;

                try {
                    console.log(`Loading image: ${gatewayUrl} (attempt ${attempt + 1})`);
                    const img = new Image();
                    if (!gatewayUrl.includes("bitfossil.org")) img.crossOrigin = "Anonymous";
                    const result = await new Promise((resolve, reject) => {
                        const timer = setTimeout(() => {
                            console.warn(`Timeout loading image: ${gatewayUrl} (attempt ${attempt + 1})`);
                            reject(new Error("Timeout loading image"));
                        }, timeout);
                        img.onload = () => {
                            clearTimeout(timer);
                            console.log(`Successfully loaded image: ${gatewayUrl}`);
                            cacheImage(url, gatewayUrl);
                            resolve(gatewayUrl);
                        };
                        img.onerror = () => {
                            clearTimeout(timer);
                            console.error(`Error loading image: ${gatewayUrl} (attempt ${attempt + 1})`);
                            reject(new Error("Error loading image"));
                        };
                        img.src = gatewayUrl;
                    });
                    return result;
                } catch (error) {
                    if (attempt === retries) {
                        console.error(`Failed to load image after ${retries + 1} attempts: ${url}`);
                        cacheImage(url, state.fallbackImage);
                        return state.fallbackImage;
                    }
                    await new Promise(resolve => setTimeout(resolve, 1000)); // Delay between retries
                }
            }
        };

        const setupLazyLoading = () => {
            const observer = new IntersectionObserver(
                (entries, observer) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            const mediaElement = entry.target;
                            const url = mediaElement.dataset.src;
                            const hash = mediaElement.dataset.hash;
                            if (mediaElement.tagName === "SOURCE") {
                                mediaElement.src = url;
                                mediaElement.parentElement.load();
                                mediaElement.parentElement.style.display = "block";
                            }
                            observer.unobserve(mediaElement);
                        }
                    });
                },
                { rootMargin: "100px" }
            );
            return observer;
        };

        const lazyLoadObserver = setupLazyLoading();

        const abbreviateAddress = (address) =>
            address ? `${address.slice(0, 6)}...${address.slice(-4)}` : "";

        const isBitcoinAddress = (str) => {
            if (!str || typeof str !== "string") return false;
            const s = str.trim();
            return /^[13][1-9A-HJ-NP-Za-km-z]{24,33}$/.test(s) ||
                   /^bc1[ac-hj-np-z02-9]{39,59}$/.test(s) ||
                   /^[mn2][1-9A-HJ-NP-Za-km-z]{24,33}$/.test(s) ||
                   /^tb1[ac-hj-np-z02-9]{39,59}$/.test(s);
        };

        const createSearchLink = (text, mainnet, isUnacknowledged = false, fullAddress = null) => {
            if (!text) return "";
            const urn = text.startsWith("@") ? text.slice(1) : text;
            const searchTarget = fullAddress || text;
            return `<span class="urn-link${isUnacknowledged ? " unacknowledged" : ""
                }" data-urn="${searchTarget}" data-mainnet="${mainnet}">${urn}</span>`;
        };

        const renderUrnLink = (urn, mainnet) => {
            if (!urn) return "URN: None";
            if (urn.startsWith("IPFS:") || /^ipfs[:/]+/i.test(urn)) {
                const hash = urn.replace(/^ipfs[:/]+/i, "").split("/")[0].replace(/\s+/g, "");
                return `URN: <a href="https://ipfs.io/ipfs/${hash}" target="_blank" style="color:#bb86fc">${urn}</a>`;
            }
            if (
                /^(BTC|LTC|DOG|MZC):/i.test(urn) ||
                /^[A-Za-z0-9]+\/.+/.test(urn)
            ) {
                const parts = urn.split(":").pop().split("/");
                return `URN: <a href="https://bitfossil.org/${parts[0]}/${parts[1] || ""
                    }" target="_blank" style="color:#bb86fc">${urn}</a>`;
            }
            return `URN: ${createSearchLink(urn, mainnet)}`;
        };

        const parseMessage = async (message, mainnet, searchId) => {
            if (state.currentSearchId !== searchId) {
                console.log(`Aborting parseMessage for outdated search ID: ${searchId}`);
                return { cleanMessage: "", attachments: [], links: [] };
            }
            const attachments = [];
            const links = [];
            const urnRegex = /@([A-Za-z0-9]+(?:\/[A-Za-z0-9]+)?)/g;
            const keywordRegex = /#([\w]+)/g;
            let cleanMessage = message
                .replace(/<<[^>]+>>/g, "")
                .trim();
            const attachmentMatches = message.match(/<<[^>]+>>/g) || [];
            attachmentMatches.forEach((match) => {
                const content = match.slice(2, -2).replace(/\s+/g, "").trim();
                if (content.match(/^-?\d+$/) || content.match(/#[\w\s#]+/) || content.match(/^#[\w\s]+$/)) {
                    return;
                }
                if (/^https?:\/\//i.test(content)) {
                    links.push(content);
                } else {
                    attachments.push(content);
                }
            });
            const parsedAttachments = attachments.map((attach) => {
                const parts = attach.split(/[\/\\]/);
                const hash = parts[0].replace(/^IPFS:/i, "").trim();
                const filename = parts[1] || hash;
                return { hash, filename };
            });
            const parsedLinks = links.map(url => ({ url }));
            const matches = [...cleanMessage.matchAll(urnRegex)];
            if (matches.length) {
                for (const match of matches) {
                    if (state.currentSearchId !== searchId) {
                        console.log(`Aborting profile fetch for outdated search ID: ${searchId}`);
                        return { cleanMessage, attachments: parsedAttachments, links: parsedLinks };
                    }
                    const urn = match[1];
                    if (!/^[a-zA-Z0-9]{26,35}$/.test(urn) && !/^[a-zA-Z0-9]+\/[a-zA-Z0-9]+$/.test(urn)) {
                        console.warn(`Invalid URN format: ${urn}`);
                        continue;
                    }
                    const profile = await fetchProfileByAddress(urn, mainnet, state.abortController?.signal);
                    if (!profile) continue;
                    const displayName = profile
                        ? profile.DisplayName || profile.URN || urn
                        : urn;
                    const isUnacknowledged =
                        profile && profile.Creators?.[urn] === "0001-01-01T00:00:00";
                    cleanMessage = cleanMessage.replace(
                        match[0],
                        createSearchLink(displayName, mainnet, isUnacknowledged)
                    );
                }
            }
            const keywordMatches = [...cleanMessage.matchAll(keywordRegex)];
            if (keywordMatches.length) {
                for (const match of keywordMatches) {
                    const keyword = match[1];
                    cleanMessage = cleanMessage.replace(
                        `#${keyword}`,
                        `<span class="keyword-link" data-keyword="${keyword}" data-mainnet="${mainnet}">#${keyword}</span>`
                    );
                }
            }
            return { cleanMessage, attachments: parsedAttachments, links: parsedLinks };
        };

        const displayProfile = async (profile, mainnet, isKeywordSearch = false, searchTerm = "", searchId) => {
            if (state.currentSearchId !== searchId) {
                console.log(`Aborting displayProfile for outdated search ID: ${searchId}`);
                return;
            }
            const $ = (id) => document.getElementById(id);
            let imageUrl;
            if (isKeywordSearch) {
                const canvas = document.createElement("canvas");
                canvas.width = 100;
                canvas.height = 100;
                const ctx = canvas.getContext("2d");
                ctx.fillStyle = "#333";
                ctx.fillRect(0, 0, 100, 100);
                ctx.fillStyle = "#bb86fc";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.fillText(searchTerm, 50, 50);
                imageUrl = canvas.toDataURL();
            } else {
                imageUrl = getImageUrl(profile.Image, profile.URN);
            }
            $("profileImage").src = state.fallbackImage;
            loadImageWithTimeout(imageUrl)
                .then((url) => {
                    if (state.currentSearchId !== searchId) {
                        console.log(`Aborting profile image update for outdated search ID: ${searchId}`);
                        return;
                    }
                    $("profileImage").src = url;
                })
                .catch(() => {
                    console.error(`Failed to load profile image: ${imageUrl}`);
                    if (state.currentSearchId !== searchId) return;
                    $("profileImage").src = state.fallbackImage;
                });
            $("profileName").textContent =
                isKeywordSearch ? `Keyword Search: ${searchTerm}` : (profile.DisplayName || profile.URN || "Unknown");
            $("profileBio").textContent = `Bio: ${isKeywordSearch ? "Keyword-derived address" : (profile.Bio || "No bio available")}`;
            $("profileLocation").textContent = `Location: ${isKeywordSearch ? "N/A" : (profile.Location?.quark || "Unknown")
                }`;
            const linksHtml = !isKeywordSearch && profile.URL
                ? Object.entries(profile.URL || {})
                    .map(([k, v]) =>
                        v.startsWith("@")
                            ? `<a href="#" onclick="searchProfile('${v
                                .slice(1)
                                .replace(/'/g, "\\'")}', ${mainnet}); event.preventDefault();" style="color:#bb86fc; text-decoration:underline; cursor:pointer;">${v
                                    .slice(1)
                                    .replace(/'/g, "\\'")}</a>`
                            : `<a href="${v}" target="_blank" style="color:#bb86fc;">${k}</a>`
                    )
                    .join(" | ") || "None"
                : "None";
            $("profileLinks").innerHTML = `Links: ${linksHtml}`;
            $("profileCreated").textContent = `Created: ${isKeywordSearch ? "N/A" : profile.CreatedDate}`;
            $("profileChanged").textContent = `Last Changed: ${isKeywordSearch ? "N/A" : profile.ChangeDate}`;
            $("profileSection").style.display = "flex";
            $("profileLoading").style.display = "none";
            state.creatorAddress = isKeywordSearch ? state.creatorAddress : (profile?.Creators?.[0] || state.creatorAddress);
            console.log(`Profile displayed, creatorAddress set to: ${state.creatorAddress}`);
            updateTotalMessages();
        };

        const displayMessages = async (messages, mainnet, searchId, prepend = false) => {
            if (state.currentSearchId !== searchId) {
                console.log(`Aborting displayMessages for outdated search ID: ${searchId}`);
                return;
            }
            const messagesThread = document.getElementById("messagesThread");
            const messageCards = [];
            const imageElements = [];

            console.log(`Displaying ${messages.length} messages, prepend=${prepend}`);
            for (const msg of messages) {
                if (state.displayedMessageIds.has(msg.TransactionId)) {
                    console.log(`Skipping duplicate message, TransactionId: ${msg.TransactionId}`);
                    continue;
                }
                state.displayedMessageIds.add(msg.TransactionId);
                const { cleanMessage, attachments, links } = await parseMessage(
                    msg.Message,
                    mainnet,
                    searchId
                );
                const fromProfile = await fetchProfileByAddress(msg.FromAddress, mainnet, state.abortController?.signal);
                const toProfile = await fetchProfileByAddress(msg.ToAddress, mainnet, state.abortController?.signal);
                const fromName = fromProfile
                    ? fromProfile.DisplayName ||
                    fromProfile.URN ||
                    abbreviateAddress(msg.FromAddress)
                    : abbreviateAddress(msg.FromAddress);
                const toName = toProfile
                    ? toProfile.DisplayName ||
                    toProfile.URN ||
                    abbreviateAddress(msg.ToAddress)
                    : abbreviateAddress(msg.ToAddress);
                const card = document.createElement("div");
                card.className = "message-card";
                card.innerHTML = `
         <p>${cleanMessage || "No message content"}</p>
         <div class="message-attachments"></div>
         <div class="message-meta">
         From: ${createSearchLink(fromName, mainnet, false, msg.FromAddress)} |
         To: ${createSearchLink(toName, mainnet, false, msg.ToAddress)} |
         Date: ${msg.BlockDate}
         </div>
         `;
                card.addEventListener("click", (event) => {
                    const urnLink = event.target.closest(".urn-link");
                    const keywordLink = event.target.closest(".keyword-link");
                    if (urnLink) {
                        event.preventDefault();
                        const urn = urnLink.getAttribute("data-urn");
                        const isMainnet = urnLink.getAttribute("data-mainnet") === "true";
                        console.log(`Clicked urn-link: ${urn}, mainnet: ${isMainnet}`);
                        searchProfile(urn, isMainnet, false);
                    } else if (keywordLink) {
                        event.preventDefault();
                        const keyword = keywordLink.getAttribute("data-keyword");
                        const isMainnet = keywordLink.getAttribute("data-mainnet") === "true";
                        console.log(`Clicked keyword-link: ${keyword}, mainnet: ${isMainnet}`);
                        searchProfile(`#${keyword}`, isMainnet, true);
                    }
                });
                const attachmentsContainer = card.querySelector(".message-attachments");
                for (const { hash, filename } of attachments) {
                    const mediaElement = document.createElement("div");
                    // A 64-character lowercase hex string is a blockchain transaction ID;
                    // everything else (e.g. "Qm…" CIDv0, base32 CIDv1) is an IPFS hash.
                    const isTxid = /^[0-9a-f]{64}$/i.test(hash);
                    const url = isTxid
                        ? `https://bitfossil.org/${hash}/${encodeURIComponent(filename)}`
                        : `https://ipfs.io/ipfs/${hash}`;
                    const ext = (filename.match(/\.([^.]+)$/) || [])[1]?.toLowerCase() || "";
                    const isImage = /^(jpg|jpeg|png|gif|webp|bmp|svg|tiff|tif|ico|avif)$/.test(ext);
                    const isAudio = /^(mp3|wav|ogg|flac)$/.test(ext);
                    const isVideo = /^(mp4|webm|avi|mov)$/.test(ext);
                    const isPDF = ext === "pdf";
                    const audioMimeTypes = { mp3: "audio/mpeg", wav: "audio/wav", ogg: "audio/ogg", flac: "audio/flac" };
                    const videoMimeTypes = { mp4: "video/mp4", webm: "video/webm", avi: "video/avi", mov: "video/quicktime" };
                    if (isImage) {
                        mediaElement.innerHTML = `<img class="media-placeholder" src="${state.fallbackImage}" alt="Attachment" style="display: block;">`;
                        const img = mediaElement.querySelector("img");
                        imageElements.push({ img, url, hash, mediaElement, mainnet });
                    } else if (isAudio) {
                        mediaElement.innerHTML = `<audio controls style="display: none;"><source data-src="${url}" data-hash="${hash}" type="${audioMimeTypes[ext] || "audio/wav"}">Your browser does not support the audio element.</audio>`;
                        const source = mediaElement.querySelector("source");
                        const audio = source.parentElement;
                        const rect = audio.getBoundingClientRect();
                        if (rect.top >= 0 && rect.top <= window.innerHeight) {
                            source.src = url;
                            audio.load();
                            audio.style.display = "block";
                        } else {
                            lazyLoadObserver.observe(source);
                        }
                    } else if (isVideo) {
                        mediaElement.innerHTML = `<video controls style="display: none;"><source data-src="${url}" data-hash="${hash}" type="${videoMimeTypes[ext] || "video/mp4"}">Your browser does not support the video element.</video>`;
                        const source = mediaElement.querySelector("source");
                        const video = source.parentElement;
                        const rect = video.getBoundingClientRect();
                        if (rect.top >= 0 && rect.top <= window.innerHeight) {
                            source.src = url;
                            video.load();
                            video.style.display = "block";
                        } else {
                            lazyLoadObserver.observe(source);
                        }
                    } else if (isPDF) {
                        mediaElement.innerHTML = `<iframe class="pdf-viewer" src="${url}" title="${filename}"></iframe>`;
                    } else {
                        const icon = getFileCardIcon(ext);
                        const typeLabel = ext ? ext.toUpperCase() + " File" : "File";
                        const safeName = escapeHtml(filename);
                        mediaElement.innerHTML = `
                            <div class="file-card">
                                <div class="file-card-icon">${icon}</div>
                                <div class="file-card-info">
                                    <div class="file-card-name" title="${safeName}">${safeName}</div>
                                    <div class="file-card-meta">
                                        <span class="file-card-type">${escapeHtml(typeLabel)}</span>
                                        &nbsp;&middot;&nbsp;
                                        <span class="file-card-size">Fetching size...</span>
                                    </div>
                                </div>
                                <a class="file-card-download" href="${url}" target="_blank" rel="noopener noreferrer">Download</a>
                            </div>`;
                        const sizeEl = mediaElement.querySelector(".file-card-size");
                        fetchFileSize(url, sizeEl);
                    }
                    attachmentsContainer.appendChild(mediaElement);
                }
                for (const { url } of links) {
                    const ext = (url.match(/\.([^./?#]+)(?:[?#].*)?$/) || [])[1]?.toLowerCase() || "";
                    const isImage = /^(jpg|jpeg|png|gif|webp|bmp|svg|avif)$/.test(ext);
                    // Detect YouTube: youtube.com/watch?v=ID (v= may appear after other params) or youtu.be/ID
                    const ytMatch = url.match(
                        /(?:youtube\.com\/watch\?(?:[^#]*&)?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/
                    );
                    const linkMedia = document.createElement("div");
                    if (ytMatch) {
                        const videoId = ytMatch[1];
                        linkMedia.innerHTML = `<iframe class="video-embed" src="https://www.youtube.com/embed/${videoId}" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                    } else if (isImage) {
                        linkMedia.innerHTML = `<img class="media-placeholder" src="${state.fallbackImage}" alt="Image" style="display:block;">`;
                        const img = linkMedia.querySelector("img");
                        imageElements.push({ img, url, hash: "", mediaElement: linkMedia, mainnet });
                    } else {
                        // PDF links, generic web links, and all other <<link>> URLs → file card
                        const icon = ext === "pdf" ? "📄" : getFileCardIcon(ext);
                        const typeLabel = ext ? ext.toUpperCase() + " File" : "Link";
                        let displayName = url;
                        try { const u = new URL(url); displayName = u.hostname + (u.pathname !== "/" ? u.pathname : ""); } catch { /* URL constructor throws on relative URLs; fall back to raw string */ }
                        const safeName = escapeHtml(displayName);
                        const safeUrl = escapeHtml(url);
                        linkMedia.innerHTML = `
                            <div class="file-card">
                                <div class="file-card-icon">${icon}</div>
                                <div class="file-card-info">
                                    <div class="file-card-name" title="${safeUrl}">${safeName}</div>
                                    <div class="file-card-meta">
                                        <span class="file-card-type">${escapeHtml(typeLabel)}</span>
                                        &nbsp;&middot;&nbsp;
                                        <span class="file-card-size">Fetching size...</span>
                                    </div>
                                </div>
                                <a class="file-card-download" href="${safeUrl}" target="_blank" rel="noopener noreferrer">Open</a>
                            </div>`;
                        const sizeEl = linkMedia.querySelector(".file-card-size");
                        fetchFileSize(url, sizeEl);
                    }
                    attachmentsContainer.appendChild(linkMedia);
                }
                // On-chain attachments: fetch file metadata (name + size) from the blockchain
                // via GetRootByTransactionID and render each file entry.
                const root = await fetchRootByTransactionId(msg.TransactionId, mainnet, state.abortController?.signal);
                if (root && root.File && typeof root.File === "object") {
                    for (const [filename, fileSize] of Object.entries(root.File)) {
                        if (!filename || filename === "SIG") continue;
                        const txid = msg.TransactionId;
                        const downloadUrl = `https://bitfossil.org/${txid}/${encodeURIComponent(filename)}`;
                        const ext = (filename.match(/\.([^.]+)$/) || [])[1]?.toLowerCase() || "";
                        const onchainMedia = document.createElement("div");
                        if (ext === "pdf") {
                            onchainMedia.innerHTML = `<iframe class="pdf-viewer" src="${downloadUrl}" title="${escapeHtml(filename)}"></iframe>`;
                        } else if (/^(jpg|jpeg|png|gif|webp|bmp|svg|tiff|tif|ico|avif)$/.test(ext)) {
                            onchainMedia.innerHTML = `<img class="media-placeholder" src="${state.fallbackImage}" alt="${escapeHtml(filename)}" style="display:block;">`;
                            const img = onchainMedia.querySelector("img");
                            imageElements.push({ img, url: downloadUrl, hash: txid, mediaElement: onchainMedia, mainnet });
                        } else {
                            const icon = getFileCardIcon(ext);
                            const typeLabel = ext ? ext.toUpperCase() + " File" : "File";
                            const knownSize = formatBytes(fileSize);
                            const safeName = escapeHtml(filename);
                            onchainMedia.innerHTML = `
                                <div class="file-card">
                                    <div class="file-card-icon">${icon}</div>
                                    <div class="file-card-info">
                                        <div class="file-card-name" title="${safeName}">${safeName}</div>
                                        <div class="file-card-meta">
                                            <span class="file-card-type">${escapeHtml(typeLabel)}</span>
                                            &nbsp;&middot;&nbsp;
                                            <span class="file-card-size">${knownSize || "Size unknown"}</span>
                                        </div>
                                    </div>
                                    <a class="file-card-download" href="${downloadUrl}" target="_blank" rel="noopener noreferrer">Download</a>
                                </div>`;
                        }
                        attachmentsContainer.appendChild(onchainMedia);
                    }
                }
                messageCards.push(card);
            }

            console.log(`Appending ${messageCards.length} message cards to thread, prepend=${prepend}`);
            if (prepend) {
                messageCards.reverse().forEach(card => messagesThread.prepend(card));
            } else {
                messageCards.forEach(card => messagesThread.appendChild(card));
            }

            for (const { img, url, hash, mediaElement, mainnet } of imageElements) {
                console.log(`Processing image: ${url}`);
                await loadImageWithTimeout(url)
                    .then((resolvedUrl) => {
                        console.log(`Image resolved: ${url} -> ${resolvedUrl}`);
                        img.src = resolvedUrl;
                        img.classList.remove("media-placeholder");
                        img.style.display = "block";
                    })
                    .catch(() => {
                        console.error(`Failed to load image: ${url}`);
                        mediaElement.innerHTML = `<div class="media-error">Failed to load: ${renderUrnLink(
                            `IPFS:${hash}`,
                            mainnet
                        )}</div>`;
                    });
            }

            updateTotalMessages();
        };

        const loadMessages = async (mainnet, prepend = false, searchId) => {
            if (state.isLoading || state.currentSearchId !== searchId) {
                console.log(`Aborting loadMessages: isLoading=${state.isLoading}, searchId=${searchId}, currentSearchId=${state.currentSearchId}`);
                state.isLoading = false;
                console.log(`Reset isLoading to false due to abort`);
                return;
            }
            state.isLoading = true;
            console.log(`Setting isLoading to true for loadMessages, prepend=${prepend}`);
            const $ = (id) => document.getElementById(id);
            $("loading").style.display = "block";
            $("error").style.display = "none";
            try {
                if (!state.allMessages.length && state.creatorAddress) {
                    console.log(`Initial fetch for messages, address: ${state.creatorAddress}, mainnet: ${mainnet}`);
                    const messages = await fetchMessages(
                        state.creatorAddress,
                        mainnet,
                        0,
                        5000,
                        state.abortController?.signal
                    );
                    if (state.currentSearchId !== searchId) {
                        console.log(`Aborting initial message processing for outdated search ID: ${searchId}`);
                        state.isLoading = false;
                        console.log(`Setting isLoading to false due to outdated search ID`);
                        return;
                    }
                    state.allMessages = messages || [];
                    console.log(`Fetched ${state.allMessages.length} messages initially`);
                    state.allMessages.sort(
                        (a, b) => new Date(b.BlockDate) - new Date(a.BlockDate)
                    );
                    state.totalMessages = state.allMessages.length;
                    if (!state.totalMessages) {
                        console.log(`No messages found for address: ${state.creatorAddress}`);
                        $("loading").style.display = "none";
                        $("messagesThread").innerHTML =
                            '<div class="loading">No messages found.</div>';
                        state.isLoading = false;
                        console.log(`Setting isLoading to false due to no messages`);
                        setTimeout(() => {
                            console.log(`Retrying initial loadMessages after ${state.retryDelay}ms`);
                            loadMessages(mainnet, false, searchId);
                        }, state.retryDelay);
                        return;
                    }
                    try {
                        console.log(`Caching ${state.allMessages.length} messages for address: ${state.creatorAddress}`);
                        cacheMessages(state.creatorAddress, mainnet, state.allMessages);
                    } catch (e) {
                        console.error(`Failed to cache messages : ${e.message}`);
                    }
                    state.retryDelay = 2000;
                }
                if (prepend) {
                    console.log(`Refresh triggered for address: ${state.creatorAddress}, mainnet: ${mainnet}`);
                    const newMessages = await fetchMessages(
                        state.creatorAddress,
                        mainnet,
                        0,
                        5000,
                        state.abortController?.signal
                    );
                    if (state.currentSearchId !== searchId) {
                        console.log(`Aborting refresh processing for outdated search ID: ${searchId}`);
                        state.isLoading = false;
                        console.log(`Setting isLoading to false due to outdated search ID in refresh`);
                        return;
                    }
                    console.log(`Fetched ${newMessages.length} messages from p2fk.io`);
                    newMessages.sort(
                        (a, b) => new Date(b.BlockDate) - new Date(a.BlockDate)
                    );
                    const newIds = new Set(newMessages.map((m) => m.TransactionId));
                    const existingIds = new Set(state.allMessages.map((m) => m.TransactionId));
                    const additionalMessages = newMessages.filter(
                        (m) => !existingIds.has(m.TransactionId)
                    );
                    console.log(`Found ${additionalMessages.length} new messages not in cache`);
                    if (additionalMessages.length) {
                        console.log(`Prepending ${additionalMessages.length} new messages to thread`);
                        state.allMessages = [...additionalMessages, ...state.allMessages];
                        state.totalMessages = state.allMessages.length;
                        try {
                            console.log(`Updating cache with ${state.allMessages.length} total messages`);
                            cacheMessages(state.creatorAddress, mainnet, state.allMessages);
                        } catch (e) {
                            console.error(`Failed to update cache: ${e.message}`);
                        }
                        const messagesThread = $("messagesThread");
                        const scrollTop = window.scrollY;
                        const oldHeight = messagesThread.scrollHeight;
                        console.log(`Current scroll position before prepend: ${scrollTop}, thread height: ${oldHeight}`);
                        await displayMessages(additionalMessages, mainnet, searchId, true);
                        if (state.currentSearchId !== searchId) {
                            console.log(`Aborting message display for outdated search ID: ${searchId}`);
                            state.isLoading = false;
                            console.log(`Setting isLoading to false due to outdated search ID in display`);
                            return;
                        }
                        const newHeight = messagesThread.scrollHeight;
                        const heightDiff = newHeight - oldHeight;
                        console.log(`Restoring scroll position, new height: ${newHeight}, height diff: ${heightDiff}`);
                        window.scrollTo(0, scrollTop + heightDiff);
                    } else {
                        console.log(`No new messages to prepend`);
                    }
                    state.isLoading = false;
                    console.log(`Setting isLoading to false after refresh`);
                    $("loading").style.display = "none";
                    updateTotalMessages();
                    console.log(`Refresh completed, total messages: ${state.totalMessages}`);
                    return;
                }
                const batch = state.allMessages.slice(
                    state.skip,
                    state.skip + state.batchSize
                );
                console.log(`Loading batch of ${batch.length} messages, skip: ${state.skip}`);
                state.hasMore = state.skip + batch.length < state.totalMessages;
                if (!batch.length && state.totalMessages > 0) {
                    console.log(`No more messages to load, total: ${state.totalMessages}`);
                    state.hasMore = false;
                    state.isLoading = false;
                    console.log(`Setting isLoading to false due to no more messages`);
                    $("loading").style.display = "none";
                    updateTotalMessages();
                    return;
                }
                if (state.totalMessages === 0) {
                    console.log(`No messages available to display`);
                    $("messagesThread").innerHTML =
                        '<div class="loading">No messages found.</div>';
                    state.hasMore = false;
                    state.isLoading = false;
                    console.log(`Setting isLoading to false due to no messages available`);
                    $("loading").style.display = "none";
                    updateTotalMessages();
                    return;
                }
                await displayMessages(batch, mainnet, searchId);
                if (state.currentSearchId !== searchId) {
                    console.log(`Aborting batch display for outdated search ID: ${searchId}`);
                    state.isLoading = false;
                    console.log(`Setting isLoading to false due to outdated search ID in batch`);
                    return;
                }
                state.skip += batch.length;
                console.log(`Batch displayed, new skip: ${state.skip}`);
                state.isLoading = false;
                console.log(`Setting isLoading to false after batch load`);
                updateTotalMessages();
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log(`Messages fetch aborted for search ID: ${searchId}`);
                    state.isLoading = false;
                    console.log(`Setting isLoading to false due to abort`);
                    return;
                }
                console.error(`Error loading messages: ${error.message}`);
                showError(error.message);
                state.isLoading = false;
                console.log(`Setting isLoading to false due to error`);
                setTimeout(() => {
                    state.retryDelay = Math.min(state.retryDelay * 2, 30000);
                    console.log(`Retrying loadMessages after ${state.retryDelay}ms`);
                    loadMessages(mainnet, false, searchId);
                }, state.retryDelay);
            } finally {
                state.isLoading = false;
                console.log(`Setting isLoading to false in finally block`);
                $("loading").style.display = "none";
            }
        };

        const showError = (msg) => {
            const errorEl = document.getElementById("error");
            errorEl.textContent = msg;
            errorEl.style.display = "block";
            console.log(`Displaying error: ${msg}`);
            setTimeout(() => {
                errorEl.style.display = "none";
                console.log(`Hiding error message`);
            }, 5000);
        };

        const getPublicAddressByKeyword = async (keyword, mainnet, signal) => {
            const cacheKey = `${keyword}_${mainnet ? "mainnet" : "testnet"}`;
            if (state.keywordCache.has(cacheKey)) {
                console.log(`Cache hit for keyword: ${keyword}`);
                return state.keywordCache.get(cacheKey);
            }
            try {
                const url = `https://p2fk.io/GetPublicAddressByKeyword/${encodeURIComponent(keyword)}?mainnet=${mainnet}`;
                const response = await fetchAPI(url, `Failed to fetch address for keyword: ${keyword}`, signal);
                if (!response) {
                    console.log(`No address found for keyword: ${keyword}`);
                    return null;
                }
                const address = response;
                state.keywordCache.set(cacheKey, address);
                console.log(`Cached address for keyword: ${keyword}, address: ${address}`);
                return address;
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log(`Keyword fetch aborted for: ${keyword}`);
                    return null;
                }
                console.error(`Error fetching keyword address: ${error.message}`);
                throw error;
            }
        };

        const searchProfile = async (urn = null, mainnet = null, isKeywordSearch = false) => {
            if (state.isSearching) return;
            state.isSearching = true;

            state.abortController = new AbortController();
            const searchId = Date.now() + Math.random().toString(36).slice(2);
            state.currentSearchId = searchId;

            document.querySelectorAll("source[data-src]").forEach((el) => {
                lazyLoadObserver.unobserve(el);
            });

            const inputUrn = urn || document.getElementById("urnInput").value.trim();
            const isMainnet =
                mainnet !== null
                    ? mainnet
                    : document.getElementById("mainnetToggle").checked;
            if (!inputUrn && !getQueryParam("address") && !getQueryParam("urn")) {
                showError("Please enter a URN or #keyword");
                state.currentSearchId = null;
                state.abortController = null;
                state.isSearching = false;
                return;
            }

            const $searchBtn = document.getElementById("searchBtn");
            const $urnInput = document.getElementById("urnInput");
            if ($searchBtn) {
                $searchBtn.disabled = true;
                $searchBtn.textContent = "Searching…";
            }
            if ($urnInput) $urnInput.disabled = true;

            Object.assign(state, {
                creatorAddress: "",
                allMessages: [],
                skip: 0,
                hasMore: true,
                retryDelay: 2000,
                displayedMessageIds: new Set(),
                totalMessages: 0,
                currentURN: inputUrn,
                currentMainnet: isMainnet,
            });
            const $ = (id) => document.getElementById(id);
            $("error").style.display = "none";
            $("profileSection").style.display = "none";
            $("profileLoading").style.display = "block";
            $("urnInput").value = inputUrn;
            $("mainnetToggle").checked = isMainnet;
            $("totalMessages").textContent = "Total Messages: Loading...";
            try {
                let profile = null;
                let address = null;
                console.log(`Starting search for URN: ${inputUrn}, isKeywordSearch: ${isKeywordSearch}, mainnet: ${isMainnet}`);
                if (isKeywordSearch || inputUrn.startsWith("#")) {
                    const searchTerm = isKeywordSearch ? inputUrn.slice(1) : inputUrn.slice(1);
                    const keywordAddress = await getPublicAddressByKeyword(searchTerm, isMainnet, state.abortController.signal);
                    if (state.currentSearchId !== searchId) {
                        console.log(`Aborting keyword search for outdated search ID: ${searchId}`);
                        return;
                    }
                    if (!keywordAddress) {
                        throw new Error(`No address found for keyword: ${searchTerm}`);
                    }
                    console.log(`Keyword search resolved address: ${keywordAddress}`);
                    state.creatorAddress = keywordAddress;
                    profile = await fetchProfileByAddress(keywordAddress, isMainnet, state.abortController.signal);
                    await displayProfile(profile || {}, isMainnet, true, searchTerm, searchId);
                } else if (isBitcoinAddress(inputUrn)) {
                    console.log(`Bitcoin address detected: ${inputUrn}`);
                    profile = await fetchProfileByAddress(inputUrn, isMainnet, state.abortController.signal);
                    if (state.currentSearchId !== searchId) {
                        console.log(`Aborting address search for outdated search ID: ${searchId}`);
                        return;
                    }
                    address = inputUrn;
                    state.creatorAddress = address;
                    console.log(`Set creatorAddress from Bitcoin address: ${state.creatorAddress}`);
                    await displayProfile(profile || {}, isMainnet, false, inputUrn, searchId);
                } else {
                    profile = await fetchProfile(inputUrn, isMainnet, state.abortController.signal);
                    if (state.currentSearchId !== searchId) {
                        console.log(`Aborting profile fetch for outdated search ID: ${searchId}`);
                        return;
                    }
                    if (profile && profile.Creators?.[0]) {
                        address = profile.Creators[0];
                        console.log(`Profile found for URN: ${inputUrn}, address: ${address}`);
                    } else {
                        address = getQueryParam("address") || inputUrn;
                        console.log(`No profile found for URN, using address: ${address}`);
                        profile = await fetchProfileByAddress(address, isMainnet, state.abortController.signal);
                    }
                    state.creatorAddress = address;
                    console.log(`Set creatorAddress: ${state.creatorAddress}`);
                    await displayProfile(profile || {}, isMainnet, false, inputUrn, searchId);
                }
                if (state.currentSearchId !== searchId) {
                    console.log(`Aborting profile display for outdated search ID: ${searchId}`);
                    return;
                }
                $("messagesThread").innerHTML = "";
                if (!state.creatorAddress) {
                    console.error(`No creator address set for URN: ${inputUrn}`);
                    throw new Error("No creator address found for the profile");
                }
                console.log(`Calling loadMessages for address: ${state.creatorAddress}`);
                await loadMessages(isMainnet, false, searchId);
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log(`Search aborted for ID: ${searchId}`);
                    return;
                }
                console.error(`Search error: ${error.message}`);
                showError(error.message);
                $("profileSection").style.display = "none";
                $("messagesThread").innerHTML = '<div class="loading">No messages found.</div>';
            } finally {
                if (state.currentSearchId === searchId) {
                    $("loading").style.display = "none";
                    $("profileLoading").style.display = "none";
                    state.currentSearchId = null;
                    state.abortController = null;
                    updateTotalMessages();
                }
                state.isSearching = false;
                if ($searchBtn) {
                    $searchBtn.disabled = false;
                    $searchBtn.textContent = "Search";
                }
                if ($urnInput) $urnInput.disabled = false;
            }
        };

        const searchProfileFromLink = (event, urn, mainnet) => {
            event.preventDefault();
            console.log(`searchProfileFromLink called with urn: ${urn}, mainnet: ${mainnet}`);
            searchProfile(urn, mainnet, urn.startsWith("#"));
        };

        const updateTotalMessages = () => {
            const $total = document.getElementById("totalMessages");
            if ($total) {
                const loadedMessages = state.displayedMessageIds.size;
                const total = state.totalMessages || 0;
                $total.textContent = total === 0 ? "Total Messages: Loading..." : `Total Messages: ${loadedMessages} / ${total}`;
                console.log(`Updated total messages: ${loadedMessages} / ${total}`);
            }
        };

        const getQueryParam = (name) => {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        };

        function updateSidebarTop() {
            const wrapper = document.querySelector('.search-bar-wrapper');
            const sidebar = document.querySelector('.sidebar');
            if (!wrapper || !sidebar) return;
            const stickyTop = parseFloat(window.getComputedStyle(wrapper).top) || 0; // CSS top is always in px here
            sidebar.style.top = (stickyTop + wrapper.offsetHeight + 5) + 'px';
        }

        window.addEventListener("load", () => {
            updateSidebarTop();
            const address = getQueryParam("address");
            const urn = getQueryParam("urn");
            const mainnet = getQueryParam("mainnet") === "true";
            if (urn || address) {
                state.currentMainnet = mainnet;
                document.getElementById("mainnetToggle").checked = mainnet;
                if (urn) document.getElementById("urnInput").value = urn;
                console.log(`Initial load with urn: ${urn}, address: ${address}, mainnet: ${mainnet}`);
                searchProfile(urn || null, mainnet, false);
            }
        });

        window.addEventListener("scroll", () => {
            if (
                window.scrollY === 0 &&
                !state.isLoading &&
                state.creatorAddress
            ) {
                console.log(`Reached top of thread, triggering refresh for address: ${state.creatorAddress}`);
                loadMessages(document.getElementById("mainnetToggle").checked, true, state.currentSearchId);
            }
            if (
                window.innerHeight + window.scrollY >=
                document.body.offsetHeight - 100 &&
                !state.isLoading &&
                state.hasMore
            ) {
                console.log(`Reached bottom, loading more messages`);
                loadMessages(document.getElementById("mainnetToggle").checked, false, state.currentSearchId);
            }
        });

        window.addEventListener("resize", updateSidebarTop);

        document.getElementById("urnInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                searchProfile();
            }
        });

        document.getElementById("mainnetToggle").addEventListener("change", () => {
            state.currentMainnet = document.getElementById("mainnetToggle").checked;
            console.log(`Mainnet toggle changed to: ${state.currentMainnet}`);
        });

        /* ---- URL Builder ---- */
        function openUrlBuilder() {
            document.getElementById("ubUrn").value = document.getElementById("urnInput").value;
            document.getElementById("ubMainnet").checked = document.getElementById("mainnetToggle").checked;
            document.getElementById("ubOutput").textContent = "";
            document.getElementById("urlBuilderOverlay").style.display = "flex";
        }

        function closeUrlBuilder() {
            document.getElementById("urlBuilderOverlay").style.display = "none";
        }

        function generateUrlBuilder() {
            const urn = document.getElementById("ubUrn").value.trim();
            const mainnet = document.getElementById("ubMainnet").checked;
            const params = new URLSearchParams();
            if (urn) params.set("urn", urn);
            if (mainnet) params.set("mainnet", "true");
            const url = "socials.html?" + params.toString();
            document.getElementById("ubOutput").textContent = url;
            return url;
        }

        function copyUrlBuilder() {
            const url = document.getElementById("ubOutput").textContent;
            if (url) {
                navigator.clipboard.writeText(url).catch(() => {
                    document.getElementById("ubOutput").select?.();
                });
            }
        }

        function goUrlBuilder() {
            const url = generateUrlBuilder();
            if (url) window.location.href = url;
        }

        document.getElementById("urlBuilderOverlay").addEventListener("click", (e) => {
            if (e.target.id === "urlBuilderOverlay") closeUrlBuilder();
        });

        /* ---- Free-text search (GetKnownProfilesBySearchString + GetKnownRootsBySearchString) ---- */
        const ftState = { skip: 0, query: '', hasMore: false, isLoading: false };
        const FT_QTY = 25;

        function renderFtItem(data, blockchain, listId) {
            const list = document.getElementById(listId);
            if (!list) return;
            const item = document.createElement('div');
            item.className = 'freetext-result-item';
            const name = data.URN || data.DisplayName || data.Name || 'Unknown';
            const desc = (data.Bio || data.Description || '').substring(0, 100);
            item.innerHTML = `<div class="result-name">${escapeHtml(name)}<span class="blockchain-badge">${escapeHtml(blockchain)}</span></div>${desc ? `<div class="result-desc">${escapeHtml(desc)}</div>` : ''}`;
            list.appendChild(item);
        }

        async function doFreeTextSearch(skipVal) {
            const input = document.getElementById('freetextInput');
            const query = input ? input.value.trim() : '';
            if (!query) return;
            if (ftState.isLoading) return;
            ftState.isLoading = true;
            const isNewSearch = (skipVal === undefined);
            if (isNewSearch) {
                ftState.skip = 0;
                ftState.query = query;
                document.getElementById('freetextProfilesList').innerHTML = '';
                document.getElementById('freetextRootsList').innerHTML = '';
                document.getElementById('freetextResultsSection').style.display = 'none';
            }
            const btn = document.getElementById('freetextSearchBtn');
            const lmBtn = document.getElementById('ftLoadMore');
            if (btn) { btn.disabled = true; btn.textContent = 'Searching…'; }
            if (lmBtn) lmBtn.style.display = 'none';
            try {
                const skip = isNewSearch ? 0 : ftState.skip;
                const [profResp, rootResp] = await Promise.all([
                    fetch(`https://p2fk.io/GetKnownProfilesBySearchString?searchString=${encodeURIComponent(ftState.query)}&qty=${FT_QTY}&skip=${skip}`),
                    fetch(`https://p2fk.io/GetKnownRootsBySearchString?searchString=${encodeURIComponent(ftState.query)}&qty=${FT_QTY}&skip=${skip}`)
                ]);
                const profResults = profResp.ok ? await profResp.json() : [];
                const rootResults = rootResp.ok ? await rootResp.json() : [];
                if (Array.isArray(profResults)) {
                    profResults.forEach(r => renderFtItem(r.profile || {}, r.blockchain || 'Unknown', 'freetextProfilesList'));
                }
                if (Array.isArray(rootResults)) {
                    rootResults.forEach(r => renderFtItem(r.root || {}, r.blockchain || 'Unknown', 'freetextRootsList'));
                }
                const gotMore = (profResults.length >= FT_QTY || rootResults.length >= FT_QTY);
                ftState.skip = skip + FT_QTY;
                ftState.hasMore = gotMore;
                document.getElementById('freetextResultsSection').style.display = 'block';
                if (lmBtn) lmBtn.style.display = gotMore ? 'inline-block' : 'none';
            } catch (e) {
                showError('Free-text search failed: ' + e.message);
            } finally {
                ftState.isLoading = false;
                if (btn) { btn.disabled = false; btn.textContent = '🔍 Search'; }
            }
        }

        function loadMoreFreetext() {
            doFreeTextSearch(ftState.skip);
        }

        document.getElementById('freetextInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doFreeTextSearch();
        });
    </script>
</body>
</html>
